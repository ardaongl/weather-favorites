name: weather_favorites
description: "A clean Weather Favorites Flutter application with Firebase integration and OpenWeatherMap API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Network requests
  http: ^1.2.1

  # Cupertino Icons for Apple UI
  cupertino_icons: ^1.0.8

  # Firebase SDKs
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
